name: Run Scholarship Scraper Weekly

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scholarship/requirements.txt

      - name: Run scraper
        run: python scholarship/scraper.py

      - name: Commit updated JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add scholarship/scholarships.json
          git commit -m "Auto-update scholarship data" || echo "No changes"
          git push
