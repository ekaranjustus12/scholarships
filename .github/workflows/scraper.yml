name: Run Scholarship Scraper Weekly

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scholarship/requirements.txt

      - name: Run scraper
        env:
          RESOLVE_DEEP_LINKS: "false"   # <-- disables deep-link resolution to avoid rate-limits
          PYTHONUNBUFFERED: "1"         # <-- ensures logs appear immediately in GitHub UI
        run: python scholarship/scraper.py

      - name: Verify output
        run: |
          if [ ! -f scholarship/scholarships.json ]; then
            echo "::error::Output file not found!"
            exit 1
          fi
          echo "Scholarships collected: $(python -c "import json; print(len(json.load(open('scholarship/scholarships.json'))))")"

      - name: Commit updated JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add scholarship/scholarships.json
          git diff --cached --quiet || git commit -m "Auto-update scholarship data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
